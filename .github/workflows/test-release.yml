name: Deploy to TestPyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (major/minor/patch/alpha/beta/release)"
        required: true
        default: "patch"

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        os: [linux, windows, macos-14-arm]
        include:
          - archs: auto
            platform: auto
          - os: linux
            runs-on: ubuntu-latest
          - os: windows
            runs-on: windows-latest
          - os: macos-14-arm
            runs-on: macos-latest
            macOS-version: 14.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install PoreSpy
        run: |
          uv sync --all-extras

      - name: Install Ninja on Windows
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Bump up version and create tag
        run: |
          hatch version ${{ github.event.inputs.version }}
          echo "VERSION=v$(hatch version)" >> $GITHUB_ENV

      - name: Set up build directory and compile
        run: |
          cd src/porespy_c
          uv run meson setup build --buildtype=plain --vsenv
          uv run meson compile -C build

      - name: Move shared library into Python package
        shell: bash
        run: |
          cd src/porespy_c
          if [ "$RUNNER_OS" == "Linux" ]; then
            mv build/libwalker.so ../porespy/beta/
          elif [ "$RUNNER_OS" == "macOS" ]; then
            mv build/libwalker.dylib ../porespy/beta/
          elif [ "$RUNNER_OS" == "Windows" ]; then
            mv build/walker.dll ../porespy/beta/
          fi

      - name: ls
        shell: bash
        run: ls -lR src/porespy/beta

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.2
        env:
          CIBW_PLATFORM: ${{ matrix.platform }}
          CIBW_ARCHS: ${{ matrix.archs }}
          CIBW_ARCHS_LINUX: auto64
          CIBW_SKIP: "*-musllinux_* pp*"
          CIBW_BUILD: cp310* cp311* cp312*
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macOS-version }}
          CIBW_BUILD_VERBOSITY: 1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    # if: startsWith(github.event.head_commit.message, '[Release:]')
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TESTPYPI_TOKEN }}
          verbose: true
