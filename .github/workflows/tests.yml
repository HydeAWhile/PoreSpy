name: Tests

on:
  push:
  pull_request:
    branches:
      - release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        id: setup-uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: "**/pyproject.toml"
          cache-suffix: "uv-${{ matrix.python-version }}-${{ matrix.os }}"

      - name: Install dependencies (pip) (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          uv sync --extra test --extra extras-macos --extra build

      - name: Install dependencies (pip) (Windows, Linux)
        if: matrix.os != 'macos-latest'
        run: |
          uv sync --extra test --extra extras --extra build

      - name: Running tests
        run: uv run pytest --cov=. --cov-report=xml

      - name: Upload coverage to Codecov
        if: (matrix.python-version == 3.12) && (matrix.os == 'ubuntu-latest')
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
