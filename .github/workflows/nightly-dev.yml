name: Nightly (Dev)

on:
  schedule:
    # Run (on default branch only) at 05:00 (hr:mm) UTC -> 12am EST
    - cron: "0 5 * * *"
  workflow_dispatch:
   
jobs:
  test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (macOS)
        if : (matrix.os == 'macos-latest') || (matrix.os == 'macos-13')
        run: |
            uv sync --extra test --extra extras-macos --extra build

      - name: Install dependencies (Windows, Linux)
        if : (matrix.os != 'macos-latest') && (matrix.os != 'macos-13')
        run: |
            uv sync --extra test --extra extras --extra build

      - name: Build package
        run: |
          uv build

      - name: Run tests
        run: |
          uv run pytest -v
